name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create AI config file
        shell: bash
        run: |
          mkdir -p config
          cat > config/ai-config.yml << 'EOF'
          # AI Configuration for Cutis (generated in CI)
          ai:
            anthropic_api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
            model: "claude-sonnet-4-6"
            default_provider: "anthropic"
          EOF

      - name: Build and package (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run package:mac

      - name: Build and package (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run package:win

      - name: Remove quarantine attributes (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          find release -name "*.dmg" -exec xattr -cr {} \;
          find release -name "*.app" -exec xattr -cr {} \;

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest-mac.yml

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  create-release:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: macos-dmg
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: windows-installer
          path: release-assets
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
